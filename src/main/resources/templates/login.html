<!DOCTYPE html>
<html>
<head>
    <title>AutoTrader Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css?v=5">
    <script>
        (function() {
            const t = localStorage.getItem('traderedge-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        body {
            display: flex; flex-direction: column;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }

        .navbar { flex-shrink: 0; }

        /* CENTER */
        .center-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px 60px; }

        /* LOGIN CARD */
        .login-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px 36px; width: 420px;
            position: relative; overflow: hidden;
            box-shadow: var(--card-shadow);
            animation: fadeUp 0.4s ease both;
            transition: background 0.3s, border-color 0.3s;
        }
        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), var(--accent-cyan), transparent);
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .login-heading { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin-bottom: 6px; }
        .login-desc { font-size: 0.82rem; color: var(--text-secondary); text-align: center; margin-bottom: 28px; }
        .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 22px; }

        /* FORM */
        .form-label-login { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%; padding: 12px 14px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-primary); font-family: var(--font-mono); font-size: 0.88rem;
            outline: none; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--accent-blue); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-group-login { margin-bottom: 18px; }

        .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
        .remember-row input { width: 16px; height: 16px; accent-color: var(--accent-cyan); cursor: pointer; }
        .remember-row label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary); cursor: pointer; }

        /* LOGIN BUTTON */
        .btn-login {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px 20px;
            background: rgba(99,179,237,0.08); border: 1px solid rgba(99,179,237,0.25);
            border-radius: 8px; color: var(--accent-blue);
            font-family: var(--font-mono); font-size: 0.88rem; font-weight: 700;
            letter-spacing: 0.06em; text-decoration: none; transition: all 0.2s ease; cursor: pointer;
        }
        .btn-login:hover { background: rgba(99,179,237,0.15); border-color: rgba(99,179,237,0.5); color: var(--accent-blue); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,179,237,0.15); }
        .btn-login:active { transform: translateY(0); }

        .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--accent-red); padding: 10px 14px; border-radius: 8px; font-family: var(--font-mono); font-size: 0.78rem; text-align: center; margin-bottom: 18px; }
        .logout-msg { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.25); color: var(--accent-green); padding: 10px 14px; border-radius: 8px; font-family: var(--font-mono); font-size: 0.78rem; text-align: center; margin-bottom: 18px; }

        .secure-note { margin-top: 18px; text-align: center; font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 7px; }
        .secure-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); animation: pulse 2s infinite; flex-shrink: 0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* FOOTER */
        .site-footer { width: 100%; padding: 16px 2rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; }
        .footer-tag { background: rgba(99,179,237,0.08); border: 1px solid rgba(99,179,237,0.15); color: var(--accent-blue); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; letter-spacing: 0.04em; margin-left: 6px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
        <div class="brand">
            <div class="brand-icon">⚡</div>
            <div>
                <div class="brand-name">TRADER<span>EDGE</span> CPR</div>
                <div class="brand-sub">AutoTrader BOT</div>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme" onclick="toggleTheme()">🌙</button>
    </div>
</nav>

<div class="center-wrap">
    <div class="login-card">
        <div class="login-heading">Welcome back</div>
        <div class="login-desc">Sign in to access your trading dashboard</div>
        <hr class="divider">

        <div id="errorMsg" class="error-msg" style="display:none">Invalid email or password</div>
        <div id="logoutMsg" class="logout-msg" style="display:none">You have been logged out</div>

        <form method="post" action="/login">
            <div class="form-group-login">
                <label class="form-label-login" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            <div class="form-group-login">
                <label class="form-label-login" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="remember-row">
                <input type="checkbox" id="remember-me" name="remember-me">
                <label for="remember-me">Remember me</label>
            </div>
            <button class="btn-login" type="submit">
                Sign In
                <span style="font-size:1rem;transition:transform 0.2s">→</span>
            </button>
        </form>

        <div class="secure-note">
            <div class="secure-dot"></div>
            <span>Secure session · TraderEdge CPR</span>
        </div>
    </div>
</div>

<footer class="site-footer">
    <div>© <span id="footerYear"></span> TraderEdge CPR. All rights reserved.</div>
    <div>Built by <strong style="color:var(--text-secondary);margin:0 4px">Prabhu Arumugham</strong><span class="footer-tag">rydytrader</span></div>
</footer>

<script src="/js/common.js?v=5"></script>
<script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();
    // Show error/logout messages based on URL params
    if (window.location.search.includes('error=true')) {
        document.getElementById('errorMsg').style.display = 'block';
    }
    if (window.location.search.includes('logout=true')) {
        document.getElementById('logoutMsg').style.display = 'block';
    }
</script>

</body>
</html>
