<!DOCTYPE html>
<html>
<head>
    <title>AutoTrader Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css?v=4">
    <script>
        (function() {
            const t = localStorage.getItem('traderedge-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style>
        body {
            display: flex; flex-direction: column;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }

        .navbar { flex-shrink: 0; }

        /* CENTER */
        .center-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px 60px; }

        /* LOGIN CARD */
        .login-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px 36px; width: 420px;
            position: relative; overflow: hidden;
            box-shadow: var(--card-shadow);
            animation: fadeUp 0.4s ease both;
            transition: background 0.3s, border-color 0.3s;
        }
        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), var(--accent-cyan), transparent);
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .login-heading { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; text-align: center; margin-bottom: 6px; }
        .login-desc { font-size: 0.82rem; color: var(--text-secondary); text-align: center; margin-bottom: 28px; }
        .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 22px; }

        /* LOGIN BUTTON */
        .btn-fyers {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px 20px;
            background: rgba(99,179,237,0.08); border: 1px solid rgba(99,179,237,0.25);
            border-radius: 8px; color: var(--accent-blue);
            font-family: var(--font-mono); font-size: 0.88rem; font-weight: 700;
            letter-spacing: 0.06em; text-decoration: none; transition: all 0.2s ease; cursor: pointer;
        }
        .btn-fyers:hover { background: rgba(99,179,237,0.15); border-color: rgba(99,179,237,0.5); color: var(--accent-blue); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,179,237,0.15); }
        .btn-fyers:active { transform: translateY(0); }
        .btn-arrow { font-size: 1rem; transition: transform 0.2s; }
        .btn-fyers:hover .btn-arrow { transform: translateX(3px); }

        .secure-note { margin-top: 18px; text-align: center; font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 7px; }
        .secure-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 5px var(--accent-green); animation: pulse 2s infinite; flex-shrink: 0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* FOOTER */
        .site-footer { width: 100%; padding: 16px 2rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; }
        .footer-tag { background: rgba(99,179,237,0.08); border: 1px solid rgba(99,179,237,0.15); color: var(--accent-blue); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; letter-spacing: 0.04em; margin-left: 6px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
        <div class="brand">
            <div class="brand-icon">⚡</div>
            <div>
                <div class="brand-name">TRADER<span>EDGE</span> CPR</div>
                <div class="brand-sub">AutoTrader</div>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme" onclick="toggleTheme()">🌙</button>
    </div>
</nav>

<div class="center-wrap">
    <div class="login-card">
        <div class="login-heading">Welcome back</div>
        <div class="login-desc">Sign in to access your trading dashboard</div>
        <hr class="divider">

        <a class="btn-fyers" href="/login">
            Login with Fyers
            <span class="btn-arrow">→</span>
        </a>

        <div class="secure-note">
            <div class="secure-dot"></div>
            <span>Fyers OAuth2 · API v3</span>
        </div>
    </div>
</div>

<footer class="site-footer">
    <div>© <span id="footerYear"></span> TraderEdge CPR. All rights reserved.</div>
    <div>Built by <strong style="color:var(--text-secondary);margin:0 4px">Prabhu Arumugham</strong><span class="footer-tag">rydytrader</span></div>
</footer>

<script src="/js/common.js?v=2"></script>
<script>
    document.getElementById('footerYear').textContent = new Date().getFullYear();
</script>

</body>
</html>
