<!DOCTYPE html>
<html>
<head>
    <title>TraderEdge CPR - Console</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/shared.css?v=5">
    <style>
        .console-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0;
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .console-toolbar {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            background: rgba(99,179,237,0.03);
        }
        .console-toolbar label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); }
        .console-toolbar select, .console-toolbar input {
            font-family: var(--font-mono); font-size: 0.75rem;
            background: var(--bg-card); color: var(--text-primary);
            border: 1px solid var(--border); border-radius: 6px;
            padding: 4px 8px;
        }
        .console-body {
            overflow-y: auto; padding: 12px 16px;
            font-family: 'JetBrains Mono', 'Roboto Mono', monospace;
            font-size: 0.72rem; line-height: 1.6;
            max-height: 580px;
        }
        .console-body::-webkit-scrollbar { width: 4px; }
        .console-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .console-body::-webkit-scrollbar-track { background: transparent; }
        .log-line { white-space: pre-wrap; word-break: break-all; padding: 1px 0; }
        .log-line .ts { color: var(--text-muted); }
        .log-line .level-info  { color: var(--accent-cyan); font-weight: 600; }
        .log-line .level-warn  { color: var(--accent-yellow); font-weight: 600; }
        .log-line .level-error { color: var(--accent-red); font-weight: 600; }
        .log-line .level-debug { color: var(--text-muted); }
        .log-line .logger { color: var(--accent-blue); }
        .log-line .msg { color: var(--text-secondary); }
        .log-line .msg-success { color: var(--accent-green); }
        .log-line .msg-warning { color: var(--accent-yellow); }
        .log-line .msg-error   { color: var(--accent-red); }
        .log-line .msg-ws      { color: var(--accent-cyan); }
        .console-stats {
            padding: 8px 16px; border-top: 1px solid var(--border);
            font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted);
            display: flex; gap: 16px;
        }
        .auto-scroll-btn {
            font-family: var(--font-mono); font-size: 0.72rem;
            padding: 3px 10px; border-radius: 5px; cursor: pointer;
            background: rgba(99,179,237,0.1); color: var(--accent-cyan);
            border: 1px solid rgba(99,179,237,0.3);
        }
        .auto-scroll-btn.active { background: rgba(99,179,237,0.2); }
    </style>
    <script>
        (function() {
            const t = localStorage.getItem('traderedge-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
            document.addEventListener('DOMContentLoaded', function() {
                const btn = document.getElementById('themeToggle');
                if (btn) btn.textContent = t === 'light' ? '\u2600\uFE0F' : t === 'forest' ? '\uD83C\uDF32' : '\uD83C\uDF19';
            });
        })();
    </script>
</head>

<body>
<div class="app-layout">

<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">⚡</div>
        <div class="sidebar-brand-text">
            <div class="brand-name">TRADER<span>EDGE</span> CPR<div style="font-size:0.65rem;font-weight:500;letter-spacing:0.12em;color:var(--text-secondary);margin-top:4px;opacity:0.7;">AutoTrader BOT</div></div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-nav-section" style="display:flex;align-items:center;justify-content:space-between;"><button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Toggle sidebar" style="margin:0;padding:2px 6px;border:none;">☰</button></div>
        <a href="/home" data-tooltip="Home" class="sidebar-nav-item"><span class="sidebar-nav-icon" style="font-size:1.3rem;">⌂</span><span class="sidebar-nav-label">Home</span></a>
        <a href="/scanner" data-tooltip="Scanner" class="sidebar-nav-item"><span class="sidebar-nav-icon">◎</span><span class="sidebar-nav-label">Scanner</span></a>
        <a href="/positions" data-tooltip="Positions" class="sidebar-nav-item"><span class="sidebar-nav-icon">⬡</span><span class="sidebar-nav-label">Positions</span></a>
        <a href="/trades" data-tooltip="Trade Log" class="sidebar-nav-item"><span class="sidebar-nav-icon">⊞</span><span class="sidebar-nav-label">Trade Log</span></a>
        <a href="/journal" data-tooltip="Journal" class="sidebar-nav-item"><span class="sidebar-nav-icon">☷</span><span class="sidebar-nav-label">Journal</span></a>
        <a href="/settings" data-tooltip="Settings" class="sidebar-nav-item"><span class="sidebar-nav-icon">⚙</span><span class="sidebar-nav-label">Settings</span></a>
        <div class="sidebar-nav-section">Operations</div>
        <a href="/console" data-tooltip="Console" class="sidebar-nav-item active"><span class="sidebar-nav-icon">▤</span><span class="sidebar-nav-label">Console</span></a>
        <a href="/monitoring" data-tooltip="Monitoring" class="sidebar-nav-item"><span class="sidebar-nav-icon">◉</span><span class="sidebar-nav-label">Monitoring</span></a>
    </nav>
    <div class="sidebar-footer">
        <div class="status-pill">
            <div class="status-dot" id="statusDot"></div>
            <span id="connectionStatus" style="color: var(--text-secondary);">Checking...</span>
        </div>
    </div>
</aside>

<div class="app-main">
<nav class="navbar">
    <div class="navbar-inner">
        <div class="ticker-wrap" id="tickerWrap">
            <div class="ticker-track" id="tickerTrack"></div>
        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle theme" onclick="toggleTheme()">🌙</button>
            <button class="logout-btn" title="Logout" onclick="logout()">⏻</button>
        </div>
    </div>
</nav>

<div class="page-wrap">
    <div class="page-header fade-in">
        <div>
            <h1 class="page-title">CONSOLE</h1>
            <div class="page-subtitle">Application logs for today</div>
        </div>
    </div>


    <div class="console-wrap fade-in">
        <div class="console-toolbar">
            <label>Filter:</label>
            <select id="levelFilter">
                <option value="">All Levels</option>
                <option value="ERROR">ERROR</option>
                <option value="WARN">WARN</option>
                <option value="INFO">INFO</option>
            </select>
            <input type="time" id="fromTime" style="width:100px; font-family:var(--font-mono); font-size:0.75rem; background:var(--bg-card); color:var(--text-secondary); border:1px solid var(--border); border-radius:4px; padding:2px 4px;" title="From time">
            <span style="color:var(--text-muted); font-size:0.75rem;">to</span>
            <input type="time" id="toTime" style="width:100px; font-family:var(--font-mono); font-size:0.75rem; background:var(--bg-card); color:var(--text-secondary); border:1px solid var(--border); border-radius:4px; padding:2px 4px;" title="To time">
            <input type="text" id="searchFilter" placeholder="Search..." style="width:200px;">
            <button class="auto-scroll-btn active" id="autoScrollBtn" onclick="toggleAutoScroll()">Auto-scroll ON</button>
            <button class="auto-scroll-btn" onclick="loadLogs()">Refresh</button>
            <span style="margin-left:auto; font-family:var(--font-mono); font-size:0.68rem; color:var(--text-muted);" id="logCount">0 lines</span>
        </div>
        <div class="console-body" id="consoleBody">
            <div style="padding:40px; text-align:center; color:var(--text-muted);">Loading logs...</div>
        </div>
    </div>

    <footer class="page-footer">
        <div class="footer-copy">
            © <span id="footerYear"></span> TraderEdge CPR. All rights reserved.
        </div>
        <div class="footer-author">
            Built by <strong style="color: var(--text-secondary); margin: 0 4px;">Prabhu Arumugham</strong>
            <span class="footer-tag">rydytrader</span>
        </div>
    </footer>

</div>
</div>
</div>

<script src="/js/common.js?v=5"></script>
<script src="/js/ticker.js?v=3"></script>
<script>
    var autoScroll = true;
    var allLogLines = [];

    function toggleAutoScroll() {
        autoScroll = !autoScroll;
        var btn = document.getElementById('autoScrollBtn');
        btn.textContent = autoScroll ? 'Auto-scroll ON' : 'Auto-scroll OFF';
        btn.className = 'auto-scroll-btn' + (autoScroll ? ' active' : '');
    }

    function formatLogLine(line) {
        // Format: "2026-03-25 15:38:05.123 INFO  [ClassName] message"
        var m = line.match(/^(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d{3})\s+(INFO|WARN|ERROR|DEBUG)\s+\[([^\]]+)\]\s+(.*)$/);
        if (!m) return '<div class="log-line"><span class="msg">' + escHtml(line) + '</span></div>';

        var ts = m[1], level = m[2], logger = m[3], msg = m[4];
        var levelClass = 'level-' + level.toLowerCase();

        // Color-code message based on content
        var msgClass = 'msg';
        if (msg.includes('[SUCCESS]')) msgClass = 'msg-success';
        else if (msg.includes('[WARNING]')) msgClass = 'msg-warning';
        else if (msg.includes('[ERROR]')) msgClass = 'msg-error';
        else if (msg.includes('[WS]')) msgClass = 'msg-ws';
        else if (msg.includes('[OrderWS]') || msg.includes('[FyersWS]') || msg.includes('[MarketData]') || msg.includes('[OrderEventSvc]')) msgClass = 'msg-ws';

        return '<div class="log-line">'
            + '<span class="ts">' + escHtml(ts) + '</span> '
            + '<span class="' + levelClass + '">' + level.padEnd(5) + '</span> '
            + '<span class="logger">[' + escHtml(logger) + ']</span> '
            + '<span class="' + msgClass + '">' + escHtml(msg) + '</span>'
            + '</div>';
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function extractTime(line) {
        // Log format: "HH:mm:ss" or "HH:mm:ss.SSS" at the start after date
        var m = line.match(/(\d{2}:\d{2})/);
        return m ? m[1] : '';
    }

    function renderLogs() {
        var levelFilter = document.getElementById('levelFilter').value;
        var searchFilter = document.getElementById('searchFilter').value.toLowerCase();
        var fromTime = document.getElementById('fromTime').value;
        var toTime = document.getElementById('toTime').value;
        var body = document.getElementById('consoleBody');

        var filtered = allLogLines.filter(function(line) {
            if (levelFilter && line.indexOf(' ' + levelFilter + ' ') === -1) return false;
            if (searchFilter && line.toLowerCase().indexOf(searchFilter) === -1) return false;
            if (fromTime || toTime) {
                var t = extractTime(line);
                if (t) {
                    if (fromTime && t < fromTime) return false;
                    if (toTime && t > toTime) return false;
                }
            }
            return true;
        });

        document.getElementById('logCount').textContent = filtered.length + ' / ' + allLogLines.length + ' lines';

        var html = filtered.map(formatLogLine).join('');
        body.innerHTML = html || '<div style="padding:40px; text-align:center; color:var(--text-muted);">No matching log lines</div>';

        if (autoScroll) {
            body.scrollTop = body.scrollHeight;
        }
    }

    function loadLogs() {
        fetch('/api/console-log?lines=1000')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (Array.isArray(data)) {
                    allLogLines = data;
                    renderLogs();
                }
            })
            .catch(function() {});
    }

    document.getElementById('levelFilter').addEventListener('change', renderLogs);
    document.getElementById('searchFilter').addEventListener('input', renderLogs);
    document.getElementById('fromTime').addEventListener('input', renderLogs);
    document.getElementById('toTime').addEventListener('input', renderLogs);

    loadLogs();
    setInterval(loadLogs, 5000);

    // ── CONNECTION STATUS ──────────────────────
    function updateConnectionStatus() {
        var ctrl = new AbortController(); var tid = setTimeout(function(){ ctrl.abort(); }, 3000);
        fetch('/status', {signal:ctrl.signal})
            .then(function(r) { clearTimeout(tid); return r.json(); })
            .then(function(data) {
                var dot = document.getElementById('statusDot');
                var label = document.getElementById('connectionStatus');
                dot.className = 'status-dot';
                if (data.status.includes('RECONNECTING')) {
                    dot.classList.add('syncing');
                    label.textContent = data.status;
                    label.style.color = '#f97316';
                } else if (data.status.includes('WS CONNECTED')) {
                    dot.classList.add('connected');
                    label.textContent = data.status;
                    label.style.color = 'var(--accent-green)';
                } else if (data.status === 'POLLING' || data.status === 'SYNCING') {
                    dot.classList.add('syncing');
                    label.textContent = data.status;
                    label.style.color = 'var(--accent-yellow)';
                } else {
                    dot.classList.add('disconnected');
                    label.textContent = 'DISCONNECTED';
                    label.style.color = 'var(--accent-red)';
                }
            })
            .catch(function() {
                document.getElementById('statusDot').className = 'status-dot disconnected';
                document.getElementById('connectionStatus').textContent = 'DISCONNECTED';
                document.getElementById('connectionStatus').style.color = 'var(--accent-red)';
            });
    }
    setInterval(updateConnectionStatus, 3000);
    updateConnectionStatus();

    // logout() provided by common.js

    document.getElementById('footerYear').textContent = new Date().getFullYear();
</script>
</body>
</html>
